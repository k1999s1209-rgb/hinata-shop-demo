<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひなた果実店｜太陽の恵み、まるごとお届け</title>
<style>
  :root {
    --bg: #FFFBF2;
    --surface: #FFFFFF;
    --surface-2: #FFF4E4;
    --text: #3A3226;
    --text-sub: #8A7E6C;
    --line: #F0E6D6;
    --orange: #F4842C;
    --orange-dark: #E06E12;
    --green: #4E9E5B;
    --green-dark: #3E8049;
    --danger: #D9534F;
    --shadow: 0 6px 24px rgba(210, 140, 60, 0.12);
    --shadow-sm: 0 2px 10px rgba(210, 140, 60, 0.10);
    --radius: 18px;
    --radius-sm: 12px;
  }
  :root[data-theme="dark"] {
    --bg: #211C16;
    --surface: #2C261E;
    --surface-2: #362E24;
    --text: #F5EEE2;
    --text-sub: #B7A98F;
    --line: #453B2E;
    --orange: #FF9A42;
    --orange-dark: #F4842C;
    --green: #6FBF7C;
    --green-dark: #5AA867;
    --shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.30);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Rounded Mplus 1c",
                 "Segoe UI", "Yu Gothic UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    transition: background .3s, color .3s;
  }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

  /* ===== Header ===== */
  header {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .nav { display: flex; align-items: center; gap: 16px; height: 66px; }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 20px; letter-spacing: .02em; }
  .logo .mark { font-size: 26px; }
  .logo b { color: var(--orange); }
  .nav-spacer { flex: 1; }
  .nav a.navlink { color: var(--text-sub); font-weight: 700; font-size: 15px; padding: 6px 4px; }
  .nav a.navlink:hover { color: var(--orange); }
  .icon-btn {
    border: none; background: var(--surface-2); color: var(--text);
    width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
    font-size: 18px; display: grid; place-items: center; transition: transform .15s, background .2s;
  }
  .icon-btn:hover { transform: translateY(-1px); background: var(--surface); }
  .cart-btn { position: relative; }
  .cart-badge {
    position: absolute; top: -4px; right: -4px; min-width: 20px; height: 20px; padding: 0 5px;
    background: var(--orange); color: #fff; border-radius: 10px; font-size: 12px; font-weight: 800;
    display: grid; place-items: center; box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  .cart-badge.hidden { display: none; }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none; cursor: pointer; font-family: inherit; font-weight: 800; font-size: 15px;
    padding: 13px 22px; border-radius: 999px; transition: transform .15s, box-shadow .2s, background .2s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--orange); color: #fff; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: var(--green-dark); }
  .btn-ghost { background: var(--surface-2); color: var(--text); }
  .btn-ghost:hover { background: var(--surface); }
  .btn-block { width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ===== Hero ===== */
  .hero {
    background: linear-gradient(135deg, #FFE8C7 0%, #FFF4E4 55%, #EAF6EC 100%);
    border-radius: 0 0 34px 34px;
    padding: 54px 0 60px;
    position: relative; overflow: hidden;
  }
  :root[data-theme="dark"] .hero { background: linear-gradient(135deg, #3a2c18 0%, #2c261e 55%, #23301f 100%); }
  .hero-inner { display: grid; grid-template-columns: 1.1fr .9fr; gap: 28px; align-items: center; }
  .hero h1 { font-size: 40px; line-height: 1.35; letter-spacing: .01em; margin-bottom: 14px; }
  .hero h1 span { color: var(--orange); }
  .hero p { color: var(--text-sub); font-size: 17px; margin-bottom: 26px; max-width: 460px; }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .hero-art {
    aspect-ratio: 1/1; border-radius: 28px; background: var(--surface);
    box-shadow: var(--shadow); display: grid; place-items: center; font-size: 120px;
    position: relative;
  }
  .hero-art .sub { position: absolute; font-size: 46px; }
  .hero-art .s1 { top: 14%; left: 12%; }
  .hero-art .s2 { bottom: 16%; right: 12%; }
  .hero-art .s3 { top: 18%; right: 14%; }
  .badge-pill {
    display: inline-flex; align-items: center; gap: 6px; background: var(--surface); color: var(--green-dark);
    font-weight: 800; font-size: 13px; padding: 6px 14px; border-radius: 999px; margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
  }
  :root[data-theme="dark"] .badge-pill { color: var(--green); }

  /* ===== Section ===== */
  section.block { padding: 52px 0; }
  .sec-head { text-align: center; margin-bottom: 34px; }
  .sec-head .kicker { color: var(--orange); font-weight: 800; letter-spacing: .12em; font-size: 13px; }
  .sec-head h2 { font-size: 28px; margin-top: 6px; }
  .sec-head p { color: var(--text-sub); margin-top: 8px; }

  /* Features */
  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .feature {
    background: var(--surface); border-radius: var(--radius); padding: 26px 22px; text-align: center;
    box-shadow: var(--shadow-sm); border: 1px solid var(--line);
  }
  .feature .fi { font-size: 40px; }
  .feature h3 { margin: 12px 0 6px; font-size: 18px; }
  .feature p { color: var(--text-sub); font-size: 14px; }

  /* Filters */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }
  .chip {
    border: 1px solid var(--line); background: var(--surface); color: var(--text-sub);
    padding: 9px 18px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 14px;
    font-family: inherit; transition: all .18s;
  }
  .chip:hover { color: var(--orange); border-color: var(--orange); }
  .chip.active { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* Product grid */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .card {
    background: var(--surface); border-radius: var(--radius); overflow: hidden; cursor: pointer;
    box-shadow: var(--shadow-sm); border: 1px solid var(--line);
    transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
  .card .thumb { aspect-ratio: 4/3; display: grid; place-items: center; font-size: 76px; position: relative; }
  .card .tag {
    position: absolute; top: 12px; left: 12px; background: var(--green); color: #fff;
    font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 999px;
  }
  .card .tag.sale { background: var(--danger); }
  .card .body { padding: 16px 16px 18px; display: flex; flex-direction: column; flex: 1; }
  .card .cat { color: var(--text-sub); font-size: 12px; font-weight: 700; }
  .card h3 { font-size: 17px; margin: 3px 0 6px; }
  .card .desc { color: var(--text-sub); font-size: 13px; flex: 1; }
  .card .price { display: flex; align-items: baseline; gap: 8px; margin-top: 12px; }
  .card .price b { font-size: 21px; color: var(--orange); }
  .card .price .yen { font-size: 13px; color: var(--orange); font-weight: 800; }
  .card .price s { color: var(--text-sub); font-size: 13px; }
  .card .add { margin-top: 12px; }

  /* Product detail */
  .detail { display: grid; grid-template-columns: 1fr 1fr; gap: 34px; align-items: start; }
  .detail .hero-img {
    background: var(--surface-2); border-radius: var(--radius); aspect-ratio: 1/1;
    display: grid; place-items: center; font-size: 170px; box-shadow: var(--shadow-sm);
  }
  .detail .cat { color: var(--green-dark); font-weight: 800; font-size: 14px; }
  :root[data-theme="dark"] .detail .cat { color: var(--green); }
  .detail h1 { font-size: 30px; margin: 6px 0 10px; }
  .detail .lead { color: var(--text-sub); margin-bottom: 18px; }
  .detail .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
  .detail .price-row b { font-size: 34px; color: var(--orange); }
  .detail .price-row .yen { font-size: 18px; color: var(--orange); font-weight: 800; }
  .detail .price-row s { color: var(--text-sub); }
  .spec { border-top: 1px solid var(--line); margin-top: 8px; }
  .spec div { display: flex; justify-content: space-between; padding: 11px 2px; border-bottom: 1px solid var(--line); font-size: 14px; }
  .spec div span:first-child { color: var(--text-sub); }
  .qty { display: flex; align-items: center; gap: 0; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; width: fit-content; }
  .qty button { border: none; background: var(--surface-2); width: 44px; height: 44px; font-size: 20px; cursor: pointer; color: var(--text); font-family: inherit; }
  .qty button:hover { background: var(--orange); color: #fff; }
  .qty input { width: 54px; text-align: center; border: none; background: transparent; font-size: 17px; font-weight: 800; color: var(--text); font-family: inherit; }
  .detail-actions { display: flex; gap: 12px; align-items: center; margin: 22px 0; flex-wrap: wrap; }

  /* Cart */
  .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 26px; align-items: start; }
  .cart-item {
    display: grid; grid-template-columns: 84px 1fr auto; gap: 16px; align-items: center;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: 14px; margin-bottom: 14px; box-shadow: var(--shadow-sm);
  }
  .cart-item .ci-img { width: 84px; height: 84px; border-radius: 12px; background: var(--surface-2); display: grid; place-items: center; font-size: 42px; }
  .cart-item h4 { font-size: 16px; margin-bottom: 2px; }
  .cart-item .ci-cat { color: var(--text-sub); font-size: 12px; }
  .cart-item .ci-price { color: var(--orange); font-weight: 800; margin-top: 4px; }
  .cart-item .ci-right { text-align: right; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .cart-item .remove { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 13px; font-family: inherit; }
  .cart-item .remove:hover { color: var(--danger); }
  .summary {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px; box-shadow: var(--shadow-sm); position: sticky; top: 84px;
  }
  .summary h3 { font-size: 18px; margin-bottom: 16px; }
  .summary .row { display: flex; justify-content: space-between; padding: 8px 0; color: var(--text-sub); font-size: 15px; }
  .summary .row.total { border-top: 2px dashed var(--line); margin-top: 8px; padding-top: 14px; color: var(--text); font-weight: 800; font-size: 20px; }
  .summary .row.total b { color: var(--orange); }
  .free-note { background: var(--surface-2); border-radius: 10px; padding: 10px 12px; font-size: 13px; color: var(--green-dark); margin: 8px 0 14px; text-align: center; font-weight: 700; }
  :root[data-theme="dark"] .free-note { color: var(--green); }

  .empty { text-align: center; padding: 60px 20px; }
  .empty .big { font-size: 72px; }
  .empty p { color: var(--text-sub); margin: 10px 0 22px; }

  /* Checkout form */
  .checkout-layout { display: grid; grid-template-columns: 1fr 340px; gap: 26px; align-items: start; }
  .form-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 26px; box-shadow: var(--shadow-sm); }
  .form-card h3 { font-size: 18px; margin-bottom: 4px; }
  .form-card .hint { color: var(--text-sub); font-size: 13px; margin-bottom: 18px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .field label .req { color: var(--danger); font-size: 12px; margin-left: 4px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 12px;
    background: var(--bg); color: var(--text); font-family: inherit; font-size: 15px; transition: border .2s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--orange); }
  .field input.err, .field textarea.err { border-color: var(--danger); }
  .field .msg { color: var(--danger); font-size: 12px; margin-top: 5px; display: none; }
  .field .msg.show { display: block; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .pay-opts { display: flex; flex-direction: column; gap: 10px; }
  .pay-opt { display: flex; align-items: center; gap: 10px; border: 1.5px solid var(--line); border-radius: 12px; padding: 12px 14px; cursor: pointer; }
  .pay-opt input { width: auto; }

  /* Complete */
  .complete { text-align: center; padding: 30px 20px 10px; max-width: 560px; margin: 0 auto; }
  .complete .check { width: 92px; height: 92px; border-radius: 50%; background: var(--green); color: #fff; display: grid; place-items: center; font-size: 50px; margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(78,158,91,.35); }
  .complete h1 { font-size: 28px; margin-bottom: 10px; }
  .complete p { color: var(--text-sub); margin-bottom: 8px; }
  .order-box { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin: 22px 0; box-shadow: var(--shadow-sm); text-align: left; }
  .order-box .onum { text-align: center; font-size: 24px; font-weight: 800; color: var(--orange); letter-spacing: .05em; margin-bottom: 4px; }
  .order-box .olabel { text-align: center; color: var(--text-sub); font-size: 13px; margin-bottom: 16px; }
  .order-box .row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 14px; border-top: 1px solid var(--line); }
  .order-box .row span:first-child { color: var(--text-sub); }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg); padding: 13px 22px; border-radius: 999px;
    font-weight: 700; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.25);
    opacity: 0; pointer-events: none; transition: all .3s; z-index: 100; display: flex; gap: 8px; align-items: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Footer */
  footer { background: var(--surface-2); border-top: 1px solid var(--line); margin-top: 40px; padding: 40px 0 26px; }
  .foot-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 24px; margin-bottom: 26px; }
  .foot-grid h4 { font-size: 15px; margin-bottom: 12px; }
  .foot-grid a { display: block; color: var(--text-sub); font-size: 14px; padding: 4px 0; }
  .foot-grid a:hover { color: var(--orange); }
  .foot-grid p { color: var(--text-sub); font-size: 14px; }
  .foot-bottom { text-align: center; color: var(--text-sub); font-size: 13px; border-top: 1px solid var(--line); padding-top: 18px; }
  .demo-note { background: var(--orange); color: #fff; text-align: center; font-size: 13px; font-weight: 700; padding: 8px; }

  .breadcrumb { color: var(--text-sub); font-size: 13px; margin-bottom: 18px; }
  .breadcrumb a:hover { color: var(--orange); }
  .page-title { font-size: 26px; margin-bottom: 6px; }

  /* Responsive */
  @media (max-width: 860px) {
    .hero-inner { grid-template-columns: 1fr; }
    .hero-art { max-width: 300px; margin: 0 auto; }
    .hero h1 { font-size: 32px; }
    .features { grid-template-columns: 1fr; }
    .grid { grid-template-columns: repeat(2, 1fr); }
    .detail { grid-template-columns: 1fr; }
    .cart-layout, .checkout-layout { grid-template-columns: 1fr; }
    .summary { position: static; }
    .foot-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 520px) {
    .grid { grid-template-columns: 1fr; }
    .nav a.navlink { display: none; }
    .grid2 { grid-template-columns: 1fr; }
    .hero h1 { font-size: 27px; }
  }
</style>
</head>
<body>
<div class="demo-note">🍊 これはデザインデモです。実際の販売・決済・データ送信は行われません。</div>

<header>
  <div class="wrap nav">
    <a href="#/" class="logo"><span class="mark">🍊</span><span>ひなた<b>果実店</b></span></a>
    <div class="nav-spacer"></div>

<main id="app"></main>

<script>
(function () {
  "use strict";

  // ===== データ =====
  var PRODUCTS = [
    { id: "mikan",   name: "有田の温州みかん",   cat: "柑橘",     emoji: "🍊", price: 2800, old: 3200, unit: "2kg（約20〜25玉）", origin: "和歌山県有田",   season: "11〜1月", tag: "人気No.1",   desc: "甘さと酸味のバランスが自慢。皮が薄くお子様でも食べやすい定番みかん。" },
    { id: "shine",   name: "シャインマスカット", cat: "ぶどう",   emoji: "🍇", price: 4980, old: null, unit: "1房（約600g）",     origin: "長野県須坂",     season: "9〜10月", tag: "季節限定",   desc: "皮ごとパリッと、種なしで上品な甘さ。贈答にも喜ばれる高級ぶどう。" },
    { id: "amaou",   name: "博多あまおう苺",     cat: "季節限定", emoji: "🍓", price: 3480, old: null, unit: "2パック（約540g）", origin: "福岡県",         season: "12〜3月", tag: "冬の味覚",   desc: "「あまい・まるい・おおきい・うまい」を体現した、真っ赤な宝石苺。" },
    { id: "momo",    name: "山梨の完熟白桃",     cat: "季節限定", emoji: "🍑", price: 3980, old: 4400, unit: "5〜6玉（約1.5kg）", origin: "山梨県笛吹",     season: "7〜8月",  tag: "夏限定",     desc: "とろける果肉とあふれる果汁。木で完熟させた贅沢な一玉。" },
    { id: "fuji",    name: "サンふじりんご",     cat: "季節限定", emoji: "🍎", price: 2680, old: null, unit: "5kg（約14〜18玉）", origin: "青森県",         season: "11〜12月", tag: "蜜入り",     desc: "蜜がたっぷり入ったシャキシャキ食感。日持ちもよく毎日のおやつに。" },
    { id: "melon",   name: "アンデスメロン",     cat: "季節限定", emoji: "🍈", price: 3280, old: null, unit: "1玉（約1.3kg）",   origin: "熊本県",         season: "5〜6月",  tag: "母の日に",   desc: "みずみずしく上品な甘さ。青肉でとろける口当たりのメロン。" }
  ];

  var CATS = ["すべて", "柑橘", "ぶどう", "季節限定"];
  var FREE_SHIP = 5000;
  var SHIP_FEE = 660;

  // ===== 状態（カートはlocalStorage永続化）=====
  var cart = loadCart();

  function loadCart() {
    try { return JSON.parse(localStorage.getItem("hinata_cart") || "{}"); }
    catch (e) { return {}; }
  }
  function saveCart() {
    try { localStorage.setItem("hinata_cart", JSON.stringify(cart)); } catch (e) {}
    updateBadge();
  }
  function cartCount() {
    var n = 0; for (var k in cart) n += cart[k]; return n;
  }
  function cartItems() {
    var out = [];
    for (var id in cart) {
      var p = findProduct(id);
      if (p) out.push({ p: p, qty: cart[id] });
    }
    return out;
  }
  function subtotal() {
    return cartItems().reduce(function (s, it) { return s + it.p.price * it.qty; }, 0);
  }
  function shipFee(sub) { return sub === 0 ? 0 : (sub >= FREE_SHIP ? 0 : SHIP_FEE); }

  function findProduct(id) {
    for (var i = 0; i < PRODUCTS.length; i++) if (PRODUCTS[i].id === id) return PRODUCTS[i];
    return null;
  }
  function yen(n) { return "¥" + n.toLocaleString("ja-JP"); }

  // ===== カート操作 =====
  function addToCart(id, qty) {
    qty = qty || 1;
    cart[id] = (cart[id] || 0) + qty;
    saveCart();
  }
  function setQty(id, qty) {
    if (qty <= 0) delete cart[id]; else cart[id] = qty;
    saveCart();
  }
  function removeFromCart(id) { delete cart[id]; saveCart(); }

  function updateBadge() {
    var b = document.getElementById("cartBadge");
    var n = cartCount();
    b.textContent = n;
    b.classList.toggle("hidden", n === 0);
  }

  // ===== Toast =====
  var toastTimer;
  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2200);
  }

  // ===== テーマ =====
  function initTheme() {
    var saved = null;
    try { saved = localStorage.getItem("hinata_theme"); } catch (e) {}
    if (!saved) saved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    applyTheme(saved);
    document.getElementById("themeBtn").addEventListener("click", function () {
      var cur = document.documentElement.getAttribute("data-theme");
      applyTheme(cur === "dark" ? "light" : "dark");
    });
  }
  function applyTheme(mode) {
    document.documentElement.setAttribute("data-theme", mode);
    document.getElementById("themeBtn").textContent = mode === "dark" ? "☀️" : "🌙";
    try { localStorage.setItem("hinata_theme", mode); } catch (e) {}
  }

  // ===== ルーティング =====
  function parseHash() {
    var h = location.hash.replace(/^#/, "") || "/";
    var qi = h.indexOf("?");
    var path = qi >= 0 ? h.slice(0, qi) : h;
    var query = {};
    if (qi >= 0) {
      h.slice(qi + 1).split("&").forEach(function (kv) {
        var p = kv.split("=");
        query[decodeURIComponent(p[0])] = decodeURIComponent(p[1] || "");
      });
    }
    return { path: path, query: query };
  }

  function router() {
    var r = parseHash();
    var seg = r.path.split("/").filter(Boolean);
    var app = document.getElementById("app");
    window.scrollTo(0, 0);

    if (seg.length === 0) { app.innerHTML = viewHome(); bindHome(); }
    else if (seg[0] === "products") { app.innerHTML = viewProducts(r.query.cat || "すべて"); bindProducts(); }
    else if (seg[0] === "product") { app.innerHTML = viewDetail(seg[1]); bindDetail(seg[1]); }
    else if (seg[0] === "cart") { app.innerHTML = viewCart(); bindCart(); }
    else if (seg[0] === "checkout") { app.innerHTML = viewCheckout(); bindCheckout(); }
    else if (seg[0] === "complete") { app.innerHTML = viewComplete(); }
    else { app.innerHTML = '<div class="wrap block"><div class="empty"><div class="big">🤔</div><p>ページが見つかりませんでした。</p><a class="btn btn-primary" href="#/">ホームへ戻る</a></div></div>'; }
  }

        '<div class="hero-cta">' +

  function feature(i, t, d) {

  }
  function bindHome() { bindAddButtons(); bindCards(); }

  // ===== ビュー：商品一覧 =====
  function viewProducts(cat) {
    if (CATS.indexOf(cat) < 0) cat = "すべて";
    var list = cat === "すべて" ? PRODUCTS : PRODUCTS.filter(function (p) { return p.cat === cat; });
    var chips = CATS.map(function (c) {
      return '<button class="chip' + (c === cat ? ' active' : '') + '" data-cat="' + c + '">' + c + '</button>';
    }).join("");
    return '<div class="wrap block">' +
      '<div class="sec-head"><div class="kicker">PRODUCTS</div><h2>商品一覧</h2><p>旬のフルーツを取り揃えています。カテゴリで絞り込めます。</p></div>' +
      '<div class="filters">' + chips + '</div>' +
      (list.length ? '<div class="grid">' + list.map(cardHTML).join("") + '</div>'
                   : '<div class="empty"><div class="big">🍃</div><p>このカテゴリの商品は準備中です。</p></div>') +
    '</div>';

  function bindProducts() {
    bindAddButtons(); bindCards();
    Array.prototype.forEach.call(document.querySelectorAll(".chip"), function (ch) {
      ch.addEventListener("click", function () {
        var c = ch.getAttribute("data-cat");
        location.hash = "#/products" + (c === "すべて" ? "" : "?cat=" + encodeURIComponent(c));
      });
    });
  }

  function cardHTML(p) {
    var tagClass = p.old ? 'tag sale' : 'tag';
    var tagText = p.old ? 'SALE' : p.tag;
    return '<div class="card" data-go="' + p.id + '">' +
      '<div class="thumb" style="background:' + thumbBg(p.cat) + '">' + p.emoji +
        (tagText ? '<span class="' + tagClass + '">' + tagText + '</span>' : '') +
      '</div>' +
      '<div class="body">' +
        '<div class="cat">' + p.cat + '</div>' +
        '<h3>' + p.name + '</h3>' +
        '<div class="desc">' + p.desc + '</div>' +
        '<div class="price"><span class="yen">¥</span><b>' + p.price.toLocaleString("ja-JP") + '</b>' +
          (p.old ? '<s>' + yen(p.old) + '</s>' : '') + '</div>' +
        '<button class="btn btn-primary add" data-add="' + p.id + '">カートに入れる</button>' +
      '</div>' +

  function thumbBg(cat) {
    if (cat === "柑橘") return "linear-gradient(135deg,#FFE3B8,#FFD08A)";
    if (cat === "ぶどう") return "linear-gradient(135deg,#E4D5F5,#CDB6EC)";
    return "linear-gradient(135deg,#FFDCE0,#FBC5CE)";

  // ===== ビュー：商品詳細 =====
  function viewDetail(id) {
    var p = findProduct(id);
    if (!p) return '<div class="wrap block"><div class="empty"><div class="big">🍃</div><p>商品が見つかりませんでした。</p><a class="btn btn-primary" href="#/products">商品一覧へ</a></div></div>';
    return '<div class="wrap block">' +
      '<div class="breadcrumb"><a href="#/">ホーム</a> ／ <a href="#/products">商品一覧</a> ／ ' + p.name + '</div>' +
      '<div class="detail">' +
        '<div class="hero-img" style="background:' + thumbBg(p.cat) + '">' + p.emoji + '</div>' +
        '<div>' +
          '<div class="cat">' + p.cat + '</div>' +
          '<h1>' + p.name + '</h1>' +
          '<div class="lead">' + p.desc + '</div>' +
          '<div class="price-row"><span class="yen">¥</span><b>' + p.price.toLocaleString("ja-JP") + '</b>' +
            (p.old ? '<s>' + yen(p.old) + '</s>' : '') + '<span style="color:var(--text-sub);font-size:13px">（税込）</span></div>' +
          '<div class="spec">' +
            specRow("内容量", p.unit) +
            specRow("産地", p.origin) +
            specRow("旬の時期", p.season) +
            specRow("配送", "クール便（産地直送）") +
          '</div>' +
          '<div class="detail-actions">' +
            '<div class="qty"><button data-q="-">−</button><input id="qtyInput" type="text" value="1" inputmode="numeric" readonly><button data-q="+">＋</button></div>' +
            '<button class="btn btn-primary" id="addDetail">🛒 カートに入れる</button>' +
            '<button class="btn btn-green" id="buyNow">今すぐ購入</button>' +
          '</div>' +
          '<div style="color:var(--text-sub);font-size:13px">🚚 5,000円以上のご購入で送料無料／万が一の傷みは無料で再送・返金</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }
  function specRow(k, v) { return '<div><span>' + k + '</span><span>' + v + '</span></div>'; }

  function bindDetail(id) {
    var qtyInput = document.getElementById("qtyInput");
    Array.prototype.forEach.call(document.querySelectorAll('[data-q]'), function (b) {
      b.addEventListener("click", function () {
        var v = parseInt(qtyInput.value, 10) || 1;
        v += (b.getAttribute("data-q") === "+" ? 1 : -1);
        if (v < 1) v = 1; if (v > 99) v = 99;
        qtyInput.value = v;
      });
    });
    document.getElementById("addDetail").addEventListener("click", function () {
      addToCart(id, parseInt(qtyInput.value, 10) || 1);
      toast("🛒 カートに追加しました");
    });
    document.getElementById("buyNow").addEventListener("click", function () {
      addToCart(id, parseInt(qtyInput.value, 10) || 1);
      location.hash = "#/cart";
    });
  }

  // ===== ビュー：カート =====
  function viewCart() {
    var items = cartItems();
    if (!items.length) {
      return '<div class="wrap block"><h1 class="page-title">🛒 ショッピングカート</h1>' +
        '<div class="empty"><div class="big">🛒</div><p>カートに商品がありません。<br>旬のフルーツを見てみませんか？</p>' +
        '<a class="btn btn-primary" href="#/products">商品一覧へ</a></div></div>';
    }
    var sub = subtotal();
    var ship = shipFee(sub);
    var rows = items.map(function (it) {
      return '<div class="cart-item">' +
        '<div class="ci-img" style="background:' + thumbBg(it.p.cat) + '">' + it.p.emoji + '</div>' +
        '<div><h4>' + it.p.name + '</h4><div class="ci-cat">' + it.p.cat + '｜' + it.p.unit + '</div>' +
          '<div class="ci-price">' + yen(it.p.price) + '</div></div>' +
        '<div class="ci-right">' +
          '<div class="qty"><button data-dec="' + it.p.id + '">−</button>' +
            '<input type="text" value="' + it.qty + '" readonly><button data-inc="' + it.p.id + '">＋</button></div>' +
          '<button class="remove" data-rm="' + it.p.id + '">🗑 削除</button>' +
        '</div>' +
      '</div>';
    }).join("");

    var freeNote = ship > 0
      ? '<div class="free-note">あと ' + yen(FREE_SHIP - sub) + ' で送料無料まで！ 🚚</div>'
      : '<div class="free-note">🎉 送料無料が適用されています！</div>';

    return '<div class="wrap block"><h1 class="page-title">🛒 ショッピングカート</h1>' +
      '<p style="color:var(--text-sub);margin-bottom:20px">' + cartCount() + '点の商品</p>' +
      '<div class="cart-layout"><div>' + rows +
        '<a href="#/products" style="color:var(--orange);font-weight:700">← 買い物を続ける</a></div>' +
        '<div class="summary"><h3>ご注文内容</h3>' +
          '<div class="row"><span>小計</span><span>' + yen(sub) + '</span></div>' +
          '<div class="row"><span>送料</span><span>' + (ship === 0 ? '無料' : yen(ship)) + '</span></div>' +
          freeNote +
          '<div class="row total"><span>合計</span><b>' + yen(sub + ship) + '</b></div>' +
          '<a class="btn btn-primary btn-block" style="margin-top:16px" href="#/checkout">レジに進む →</a>' +
        '</div>' +
      '</div></div>';
  }
  function bindCart() {
    Array.prototype.forEach.call(document.querySelectorAll('[data-inc]'), function (b) {
      b.addEventListener("click", function () { setQty(b.getAttribute("data-inc"), (cart[b.getAttribute("data-inc")] || 0) + 1); router(); });
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-dec]'), function (b) {
      b.addEventListener("click", function () { setQty(b.getAttribute("data-dec"), (cart[b.getAttribute("data-dec")] || 0) - 1); router(); });
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-rm]'), function (b) {
      b.addEventListener("click", function () { removeFromCart(b.getAttribute("data-rm")); toast("削除しました"); router(); });
    });
  }

  // ===== ビュー：購入手続き =====
  function viewCheckout() {
    var items = cartItems();
    if (!items.length) {
      return '<div class="wrap block"><div class="empty"><div class="big">🛒</div><p>カートが空のためレジに進めません。</p><a class="btn btn-primary" href="#/products">商品一覧へ</a></div></div>';
    }
    var sub = subtotal(), ship = shipFee(sub);
    var miniRows = items.map(function (it) {

    }).join("");

    return '<div class="wrap block"><h1 class="page-title">お客様情報の入力</h1>' +
      '<p style="color:var(--text-sub);margin-bottom:20px">お届け先とお支払い方法をご入力ください。<span style="color:var(--danger)">＊</span>は必須項目です。</p>' +
      '<form id="checkoutForm" novalidate><div class="checkout-layout"><div>' +
        '<div class="form-card" style="margin-bottom:20px"><h3>お届け先</h3><div class="hint">商品のお届け先を入力してください。</div>' +
          field("name", "お名前", "例：日向 太郎", true) +

          field("addr", "ご住所", "例：東京都渋谷区神宮前1-2-3 ひなたマンション101", true) +
          field("email", "メールアドレス", "example@hinata.jp", true) +
        '</div>' +
        '<div class="form-card"><h3>お支払い方法</h3><div class="hint">デモのため実際の請求は発生しません。</div>' +
          '<div class="pay-opts">' +
            '<label class="pay-opt"><input type="radio" name="pay" value="代金引換" checked> 代金引換（現金）</label>' +
            '<label class="pay-opt"><input type="radio" name="pay" value="クレジットカード"> クレジットカード</label>' +
            '<label class="pay-opt"><input type="radio" name="pay" value="銀行振込"> 銀行振込</label>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="summary"><h3>ご注文内容</h3>' + miniRows +
        '<div class="row" style="border-top:1px solid var(--line);margin-top:6px;padding-top:10px"><span>小計</span><span>' + yen(sub) + '</span></div>' +
        '<div class="row"><span>送料</span><span>' + (ship === 0 ? '無料' : yen(ship)) + '</span></div>' +
        '<div class="row total"><span>合計</span><b>' + yen(sub + ship) + '</b></div>' +
        '<button type="submit" class="btn btn-green btn-block" style="margin-top:16px">注文を確定する</button>' +
        '<a href="#/cart" style="display:block;text-align:center;color:var(--text-sub);font-size:13px;margin-top:12px">← カートに戻る</a>' +
      '</div>' +
      '</div></form></div>';
  }
  function field(id, label, ph, req) {
    return '<div class="field"><label>' + label + (req ? '<span class="req">＊必須</span>' : '') + '</label>' +
      '<input id="f_' + id + '" name="' + id + '" placeholder="' + ph + '" autocomplete="off">' +
      '<div class="msg" id="m_' + id + '">この項目を入力してください。</div></div>';
  }
  function bindCheckout() {
    var form = document.getElementById("checkoutForm");
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var ok = true;
      var checks = [
        ["name", function (v) { return v.length > 0; }, "お名前を入力してください。"],
        ["zip",  function (v) { return /^\d{3}-?\d{4}$/.test(v); }, "郵便番号は7桁の数字で入力してください。"],
        ["tel",  function (v) { return /^0\d{9,10}$/.test(v.replace(/-/g, "")); }, "電話番号を正しく入力してください。"],
        ["addr", function (v) { return v.length >= 5; }, "ご住所を入力してください。"],
        ["email",function (v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }, "メールアドレスの形式が正しくありません。"]
      ];
      checks.forEach(function (c) {
        var input = document.getElementById("f_" + c[0]);
        var msg = document.getElementById("m_" + c[0]);
        var val = input.value.trim();
        if (!c[1](val)) {
          ok = false; input.classList.add("err"); msg.textContent = c[2]; msg.classList.add("show");
        } else {
          input.classList.remove("err"); msg.classList.remove("show");
        }
      });
      if (!ok) {
        toast("⚠️ 入力内容をご確認ください");
        var firstErr = form.querySelector(".err");
        if (firstErr) firstErr.focus();
        return;
      }
      var pay = form.querySelector('input[name="pay"]:checked').value;
      var sub = subtotal(), ship = shipFee(sub);
      var order = {
        num: genOrderNo(),
        name: document.getElementById("f_name").value.trim(),
        email: document.getElementById("f_email").value.trim(),
        pay: pay, sub: sub, ship: ship, total: sub + ship, count: cartCount()
      };
      try { sessionStorage.setItem("hinata_order", JSON.stringify(order)); } catch (e) {}
      cart = {}; saveCart();
      location.hash = "#/complete";
    });
  }
  function genOrderNo() {
    var d = new Date();
    var p = function (n) { return ("0" + n).slice(-2); };
    var ymd = "" + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate());
    var rnd = Math.floor(1000 + Math.random() * 9000);
    return "HN-" + ymd + "-" + rnd;
  }

  // ===== ビュー：注文完了 =====
  function viewComplete() {
    var order = null;
    try { order = JSON.parse(sessionStorage.getItem("hinata_order")); } catch (e) {}
    if (!order) {
      return '<div class="wrap block"><div class="empty"><div class="big">🍊</div><p>ご注文情報が見つかりませんでした。</p><a class="btn btn-primary" href="#/products">お買い物を続ける</a></div></div>';

    return '<div class="wrap block"><div class="complete">' +

      '<h1>ご注文ありがとうございます！</h1>' +
      '<p>' + esc(order.name) + ' 様、ご注文を承りました。<br>確認メールを ' + esc(order.email) + ' 宛にお送りしました（デモ）。</p>' +
      '<div class="order-box">' +
        '<div class="onum">' + order.num + '</div>' +
        '<div class="olabel">ご注文番号</div>' +
        '<div class="row"><span>商品点数</span><span>' + order.count + '点</span></div>' +
        '<div class="row"><span>小計</span><span>' + yen(order.sub) + '</span></div>' +
        '<div class="row"><span>送料</span><span>' + (order.ship === 0 ? '無料' : yen(order.ship)) + '</span></div>' +
        '<div class="row"><span>お支払い方法</span><span>' + esc(order.pay) + '</span></div>' +
        '<div class="row" style="font-weight:800;color:var(--orange)"><span>お支払い合計</span><span>' + yen(order.total) + '</span></div>' +
      '</div>' +
      '<p style="font-size:13px">商品は契約農家より産地直送でお届けします。到着まで今しばらくお待ちください🍊</p>' +
      '<a class="btn btn-primary" style="margin-top:14px" href="#/products">お買い物を続ける</a>' +
    '</div></div>';
  }
  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }

  // ===== 共通バインド =====
  function bindAddButtons() {
    Array.prototype.forEach.call(document.querySelectorAll('[data-add]'), function (b) {
      b.addEventListener("click", function (e) {
        e.stopPropagation();
        addToCart(b.getAttribute("data-add"), 1);
        toast("🛒 カートに追加しました");
      });
    });
  }
  function bindCards() {
    Array.prototype.forEach.call(document.querySelectorAll('[data-go]'), function (c) {
      c.addEventListener("click", function () { location.hash = "#/product/" + c.getAttribute("data-go"); });
    });
  }

  // ===== 起動 =====
  initTheme();
  updateBadge();
  window.addEventListener("hashchange", router);
  router();
})();
</script>
</body>
